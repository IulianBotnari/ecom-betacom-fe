<div class="container">
  <button (click)="openCreateTaglia()">Aggiungi taglia</button>
  @if (createTaglia() === true) {
    <app-aggiungi-taglia [productId]="productId()"></app-aggiungi-taglia>
  }
  <table>
    <thead>
      <th>Taglia</th>
      <th>Id taglia</th>
      <th>Quantità</th>
      <th>Azione</th>
    </thead>

    <tbody>
      @for (t of listaTaglie(); track t.id) {
        <tr class="user_row">
          <td>{{ t.size }}</td>
          <td>{{ t.id }}</td>
          <td>{{ t.quantity }}</td>
          <td>
            <button>Modifica</button>
            <button (click)="deleteTaglia(t.id)">Elimina</button>
          </td>
        </tr>
        <tr>
          <td colspan="10">
            <app-modifica-taglia [productId]="productId()"></app-modifica-taglia>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
