<form class="filter-box" (ngSubmit)="onFilter()">

  <input type="text" name="name" [(ngModel)]="filters.name" placeholder="🔍 Cerca prodotto">

  <select name="gender" [(ngModel)]="filters.gender">
    <option value=""></option>
    <option value="MALE">Uomo</option>
    <option value="FEMALE">Donna</option>
    <option value="UNISEX">Unisex</option>
  </select>

  <input type="text" name="material" [(ngModel)]="filters.material" placeholder="Materiale">

  <input type="number" step="0.01" name="price" [(ngModel)]="filters.price" placeholder="Prezzo max">

  <button type="submit">Filtra</button>

</form>

<div class="grid">
  <div class="card" *ngFor="let p of products">
    <div class="card-body">
      <h3>{{ p.name }}</h3>
      <p class="price">{{ p.price }}€</p>
      <p class="info">{{ p.material }}</p>
      <p class="info">{{ p.gender }}</p>
    </div>
  </div>
</div>
