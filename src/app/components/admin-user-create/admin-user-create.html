<h1>Aggiungi un utente</h1>

<div class="signin-container">
  <form #signInForm="ngForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input matInput type="text" name="name" placeholder="Inserisci nome" ngModel required />
      <mat-icon matSuffix>person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Cognome</mat-label>
      <input
        matInput
        type="text"
        name="lastName"
        placeholder="Inserisci cognome"
        ngModel
        required
      />
      <mat-icon matSuffix>person_outline</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input
        matInput
        type="email"
        name="email"
        placeholder="Inserisci email"
        ngModel
        required
        email
      />
      <mat-icon matSuffix>mail</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Data di nascita</mat-label>
      <input matInput type="date" name="birthday" ngModel required />
      <mat-icon matSuffix>calendar_today</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Codice Fiscale</mat-label>
      <input matInput type="text" name="codiceFiscale" placeholder="(opzionale)" ngModel />
      <mat-icon matSuffix>badge</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Telefono</mat-label>
      <input matInput type="text" name="phone" placeholder="Inserisci telefono" ngModel required />
      <mat-icon matSuffix>phone</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input
        matInput
        type="password"
        name="password"
        placeholder="Inserisci password"
        ngModel
        required
        minlength="8"
      />
      <mat-icon matSuffix>lock</mat-icon>
      <mat-hint>Minimo 8 caratteri</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Controllo password</mat-label>
      <input
        matInput
        type="password"
        name="passwordControl"
        placeholder="Ripeti password"
        ngModel
        required
        minlength="8"
      />
      <mat-icon matSuffix>lock</mat-icon>
      <mat-hint>Minimo 8 caratteri</mat-hint>
    </mat-form-field>

    <div class="button-container">
      <button mat-raised-button color="primary" type="submit" [disabled]="signInForm.invalid">
        Aggiungi
      </button>
    </div>
  </form>
</div>
