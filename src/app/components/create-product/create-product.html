<div class="container">
  <h2>Crea Nuovo Prodotto</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nome</label>
      <input type="text" formControlName="name" class="form-control" />
      <small
        *ngIf="productForm.get('name')?.invalid && productForm.get('name')?.touched"
        class="text-danger"
      >.
      </small>
    </div>

    <div class="row">
      <div class="col">
        <label>Prezzo</label>
        <input type="number" formControlName="price" class="form-control" />
      </div>
      <div class="col">
        <label>ID Categoria</label>
        <input type="number" formControlName="categoryId" class="form-control" />
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label>Taglia</label>
        <select formControlName="size" class="form-control">
          <option value="" disabled>Scegli...</option>
          @for (s of availableSizes; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>
      <div class="col">
        <label>Quantità iniziale</label>
        <input type="number" formControlName="quantity" class="form-control" />
      </div>
    </div>

    <div class="form-group">
      <label>Genere</label>
      <select formControlName="gender" class="form-control">
        <option value="Uomo">Uomo</option>
        <option value="Donna">Donna</option>
        <option value="Unisex">Unisex</option>
      </select>
    </div>

    <div class="form-group">
      <label>Descrizione</label>
      <textarea formControlName="description" class="form-control"></textarea>
    </div>

    <div class="form-group">
      <label>URL Immagine</label>
      <input type="text" formControlName="image" class="form-control" />
    </div>

    <div class="form-group">
      <label>Materiale</label>
      <input type="text" formControlName="material" class="form-control" />
    </div>

    <button type="submit" [disabled]="productForm.invalid" class="btn btn-primary mt-3">
      Crea Prodotto
    </button>
  </form>
</div>
