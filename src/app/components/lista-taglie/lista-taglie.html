<div class="container">
  <table>
    <thead>
      <th>Taglia</th>
      <th>Id taglia</th>
      <th>Quantità</th>
      <th>Azione</th>
    </thead>

    <tbody>
      @for (t of listaTaglie(); track t.id) {
        <tr class="user_row">
          <td>{{ t.size }}</td>
          <td>{{ t.id }}</td>
          <td>{{ t.quantity }}</td>
          <td>
            <button (click)="deleteTaglia(t.id)">Elimina</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
